<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    html, body {
        margin: 0;
        padding: 0;
        background-color: transparent;
    }

    #fpsBox {
        font-family: monospace;
        font-size: 16px;
        font-weight: bold;
        color: #00FF00;
        background-color: rgba(0, 0, 0, 0.45);
        padding: 4px 10px;
        border-radius: 6px;
        display: inline-block;
        text-shadow: 1px 1px 2px black;
    }

    /* Düşük FPS'te renk kırmızıya dönsün */
    .low { color: #FF4444 !important; }
    .mid { color: #FFCC00 !important; }
</style>
</head>
<body>
    <div id="fpsBox">-- FPS</div>

    <script>
        function updateFPS(fps) {
            var box = document.getElementById('fpsBox');
            box.textContent = fps + ' FPS';

            box.classList.remove('low', 'mid');
            if (fps < 30) {
                box.classList.add('low');
            } else if (fps < 50) {
                box.classList.add('mid');
            }
        }
    </script>
</body>
</html>
